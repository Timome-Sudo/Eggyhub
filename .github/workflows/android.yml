name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: ~/android-sdk
  APK_DIR: app/build/outputs/apk/release
  ORIG_APK: app-release-unsigned.apk
  RENAME_APK: app-prerelease-unsigned.apk

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取源码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true
          show-progress: true

      - name: 生成动态版本Tag & 发布标题时间
        run: |
          NOW=$(date +'%Y.%m.%d.%H.%M.%S')
          echo "TAG_NAME=prerelease-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
          echo "RELEASE_TITLE=beta($NOW)" >> $GITHUB_ENV
          echo "RELEASE_BODY=本beta版为自动发布，安装后导致的所有后果本作者不承担所有责任！" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          show-progress: true

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android SDK
        uses: actions/cache@v5
        with:
          path: ~/android-sdk
          key: ${{ runner.os }}-android-sdk

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          show-progress: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        id: gradle_build
        continue-on-error: true
        run: |
          ./gradlew clean assembleRelease --no-daemon --info 2>&1 > build_log.txt
          echo EXIT_CODE=$? >> $GITHUB_ENV

      - name: 上传完整编译日志
        uses: actions/upload-artifact@v5
        with:
          name: full-build-log
          path: build_log.txt
          retention-days: 14

      - name: 打印全部编译日志，输出完整报错
        run: |
          echo "===================== 完整编译日志开始 ====================="
          cat build_log.txt
          echo "===================== 完整编译日志结束 ====================="

      - name: 全局检索所有APK用于调试
        run: |
          echo "===== 项目内全部APK ====="
          find . -name "*.apk"
          echo "===== Release目录文件 ====="
          ls -la ${{ env.APK_DIR }} 2>/dev/null || echo "release目录不存在"

      # 仅编译成功才往下执行
      - name: 校验原生未签名APK存在
        if: env.EXIT_CODE == '0'
        run: |
          SRC=${{ env.APK_DIR }}/${{ env.ORIG_APK }}
          if [ ! -f "$SRC" ]; then
            echo "错误：未找到原生包 $SRC"
            ls ${{ env.APK_DIR }}/*.apk 2>/dev/null
            exit 1
          fi

      # 在原目录重命名，不复制文件
      - name: 重命名APK为prerelease包
        if: env.EXIT_CODE == '0'
        run: |
          SRC=${{ env.APK_DIR }}/${{ env.ORIG_APK }}
          DST=${{ env.APK_DIR }}/${{ env.RENAME_APK }}
          mv "$SRC" "$DST"
          echo "重命名完成：$SRC → $DST"

      # 上传制品备份
      - name: Upload Release Backup APK
        if: env.EXIT_CODE == '0'
        uses: actions/upload-artifact@v5
        with:
          name: release-preview-backup-apk
          path: ${{ env.APK_DIR }}/${{ env.RENAME_APK }}
          retention-days: 14

      # 发布预发行版本，自定义标题与正文
      - name: Publish Prerelease Preview
        if: env.EXIT_CODE == '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_TITLE }}
          body: ${{ env.RELEASE_BODY }}
          draft: false
          prerelease: true
          generate_release_notes: false
          files: ${{ env.APK_DIR }}/${{ env.RENAME_APK }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
