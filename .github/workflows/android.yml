name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: ~/android-sdk
  APK_DIR: app/build/outputs/apk/release
  APK_FILE: app-prerelease-nosign.apk

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取源码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true
          show-progress: true

      - name: 生成动态版本Tag
        run: echo "TAG_NAME=prerelease-$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          show-progress: true

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android SDK
        uses: actions/cache@v5
        with:
          path: ~/android-sdk
          key: ${{ runner.os }}-android-sdk

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          show-progress: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        id: gradle_build
        continue-on-error: true
        run: |
          ./gradlew clean assembleRelease --no-daemon --info 2>&1 > build_log.txt
          echo EXIT_CODE=$? >> $GITHUB_ENV

      - name: 上传完整编译日志（构建失败也会保存）
        uses: actions/upload-artifact@v5
        with:
          name: full-build-log
          path: build_log.txt
          retention-days: 14

      - name: 打印全部编译日志，输出完整报错
        run: |
          echo "===================== 完整编译日志开始 ====================="
          cat build_log.txt
          echo "===================== 完整编译日志结束 ====================="

      # 全局搜索所有APK，查看云端实际产出文件
      - name: 搜索项目内所有APK文件
        run: |
          echo "===== 全局搜索所有 .apk 文件 ====="
          find . -name "*.apk"
          echo "===== release 目录内容 ====="
          ls -la ${{ env.APK_DIR }} 2>/dev/null || echo "release 目录不存在"

      # 仅构建成功时校验：必须存在指定的nosign包，忽略其他apk
      - name: 校验目标APK文件
        if: env.EXIT_CODE == '0'
        run: |
          TARGET_APK=${{ env.APK_DIR }}/${{ env.APK_FILE }}
          if [ ! -f "$TARGET_APK" ]; then
            echo "ERROR: 未找到指定预发布包 $TARGET_APK"
            echo "当前目录所有apk："
            ls ${{ env.APK_DIR }}/*.apk 2>/dev/null
            exit 1
          fi

      - name: Upload Release Backup APK
        if: env.EXIT_CODE == '0'
        uses: actions/upload-artifact@v5
        with:
          name: release-preview-backup-apk
          # 精确指定nosign包，不匹配其他apk，无冲突
          path: ${{ env.APK_DIR }}/${{ env.APK_FILE }}
          retention-days: 14

      - name: Publish Prerelease Preview
        if: env.EXIT_CODE == '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: true
          generate_release_notes: true
          # Release附件仅上传nosign包，不携带其他apk
          files: ${{ env.APK_DIR }}/${{ env.APK_FILE }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
