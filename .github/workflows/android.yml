name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: ~/android-sdk
  APK_DIR: app/build/outputs/apk/release
  APK_NAME: app-prerelease-nosign.apk

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取源码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true
          show-progress: true

      - name: 生成动态版本Tag
        run: echo "TAG_NAME=prerelease-$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          show-progress: true

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android SDK
        uses: actions/cache@v5
        with:
          path: ~/android-sdk
          key: ${{ runner.os }}-android-sdk

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          show-progress: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        id: gradle_build
        run: |
          ./gradlew clean assembleRelease --no-daemon --info 2>&1 > build_log.txt
          echo EXIT_CODE=$? >> $GITHUB_ENV

      - name: 上传完整编译日志
        uses: actions/upload-artifact@v5
        with:
          name: full-build-log
          path: build_log.txt
          retention-days: 14

      - name: 打印全部编译日志
        run: |
          echo "===================== 完整编译日志开始 ====================="
          cat build_log.txt
          echo "===================== 完整编译日志结束 ====================="

      - name: 查看APK输出目录
        run: ls -la ${{ env.APK_DIR }} || echo "APK目录不存在，构建失败"

      - name: 校验目标APK文件
        run: |
          FULL_APK=${{ env.APK_DIR }}/${{ env.APK_NAME }}
          if [ ! -f "$FULL_APK" ]; then
            echo "ERROR: 未找到目标APK -> $FULL_APK"
            exit 1
          fi

      - name: Upload Release Backup APK
        if: env.EXIT_CODE == '0'
        uses: actions/upload-artifact@v5
        with:
          name: release-preview-backup-apk
          path: ${{ env.APK_DIR }}/${{ env.APK_NAME }}
          retention-days: 14

      - name: Publish Prerelease Preview
        if: env.EXIT_CODE == '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: ${{ env.APK_DIR }}/${{ env.APK_NAME }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
